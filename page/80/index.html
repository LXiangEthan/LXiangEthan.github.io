    <article id="post-GeneralNotes/笔记(java后端全套)/JAVASE/078-static修饰成员变量" class="h-entry article article-type-post" itemprop="blogPost" itemscope itemtype="https://schema.org/BlogPosting">
  <div class="article-meta">
    <a href="/2024/05/04/GeneralNotes/%E7%AC%94%E8%AE%B0(java%E5%90%8E%E7%AB%AF%E5%85%A8%E5%A5%97)/JAVASE/078-static%E4%BF%AE%E9%A5%B0%E6%88%90%E5%91%98%E5%8F%98%E9%87%8F/" class="article-date">
  <time class="dt-published" datetime="2024-05-04T13:48:37.467Z" itemprop="datePublished">2024-05-04</time>
</a>
    
  </div>
  <div class="article-inner">
    
    
    <div class="e-content article-entry" itemprop="articleBody">
      
        <p><img src="/assets/078-static%E4%BF%AE%E9%A5%B0%E6%88%90%E5%91%98%E5%8F%98%E9%87%8F/image-20231129212839397.png"></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> com.Ethan.L;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">Main</span> &#123;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">main</span><span class="params">(String[] args)</span> &#123;  </span><br><span class="line">Student.name = <span class="string">&quot;梁响&quot;</span>;  </span><br><span class="line">System.out.println(Student.name);  </span><br><span class="line"><span class="comment">//static修饰的成员变量是类变量，无需实例化就可以访问，该类的所有实例都能访问,这个变量属于所有对象  </span></span><br><span class="line"><span class="type">Student</span> <span class="variable">stu</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">Student</span>();  </span><br><span class="line">stu.age = <span class="number">100</span>;  </span><br><span class="line">stu.name = <span class="string">&quot;lx&quot;</span>;  </span><br><span class="line">System.out.println(Student.name);  </span><br><span class="line">System.out.println(stu.age);  </span><br><span class="line"><span class="comment">//没有static修饰的成员变量是实例变量，只属于单独一个对象  </span></span><br><span class="line">&#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<p><img src="/assets/078-static%E4%BF%AE%E9%A5%B0%E6%88%90%E5%91%98%E5%8F%98%E9%87%8F/image-20231129213719497.png"><br><img src="/assets/078-static%E4%BF%AE%E9%A5%B0%E6%88%90%E5%91%98%E5%8F%98%E9%87%8F/image-20231129213808952.png"><br>注意在同一个类中，访问自己类的类变量才能省略类名不写</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> com.Ethan.L;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">Main</span> &#123;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">main</span><span class="params">(String[] args)</span> &#123;  </span><br><span class="line">Student.num = <span class="number">0</span>;  </span><br><span class="line">Student []stu = <span class="keyword">new</span> <span class="title class_">Student</span>[<span class="number">10</span>];  </span><br><span class="line"><span class="keyword">for</span>(<span class="type">int</span> <span class="variable">i</span> <span class="operator">=</span> <span class="number">0</span>;i &lt; <span class="number">10</span>;i++) &#123;  </span><br><span class="line">stu[i] = <span class="keyword">new</span> <span class="title class_">Student</span>(<span class="string">&quot;lx&quot;</span>,<span class="number">19</span>);  </span><br><span class="line">&#125;  </span><br><span class="line">System.out.println(Student.num);  </span><br><span class="line">&#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">package com.Ethan.L;  </span><br><span class="line">  </span><br><span class="line">public class Student &#123;  </span><br><span class="line">static int num;  </span><br><span class="line">String name;  </span><br><span class="line">int age;  </span><br><span class="line">  </span><br><span class="line">public Student(String name, int age) &#123;  </span><br><span class="line">this.name = name;  </span><br><span class="line">this.age = age;  </span><br><span class="line">this.num++;  </span><br><span class="line">&#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

    <div class="e-content article-entry" itemprop="articleBody">
      
        <p><img src="/assets/071-String%E7%9A%84%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123200919586.png"><br><img src="/assets/071-String%E7%9A%84%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123201137545.png"><br><img src="/assets/071-String%E7%9A%84%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123201222708.png"></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> com.Ethan.L;  </span><br><span class="line">  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">Main</span> &#123;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">main</span><span class="params">(String[] args)</span> &#123;  </span><br><span class="line"><span class="type">String</span> <span class="variable">name</span> <span class="operator">=</span> <span class="string">&quot;com.Ethan.L&quot;</span>;  </span><br><span class="line"><span class="type">String</span> <span class="variable">cname</span> <span class="operator">=</span> <span class="string">&quot;com.Ethan.L&quot;</span>;  </span><br><span class="line">System.out.println(name == cname);<span class="comment">//true,直接用双引号的方式创建的String对象是同一个内存空间  </span></span><br><span class="line"><span class="type">String</span> <span class="variable">str</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">String</span>(<span class="string">&quot;hello&quot;</span>);  </span><br><span class="line"><span class="type">String</span> <span class="variable">str1</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">String</span>(<span class="string">&quot;hello&quot;</span>);  </span><br><span class="line">System.out.println(str == str1);<span class="comment">//false  </span></span><br><span class="line">&#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<p>java为了节约内存设计出来””直接赋值的String放在常量池里面<br><img src="/assets/071-String%E7%9A%84%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123202359556.png"><br><img src="/assets/071-String%E7%9A%84%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123202526754.png"><br><img src="/assets/071-String%E7%9A%84%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123202654027.png"><br><img src="/assets/071-String%E7%9A%84%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123202809583.png"><br>String类型就是常量，+拼接后得到的String不是直接基于原String修改，而直接在堆区创建新对象。只有通过”string”直接赋值的才会放在常量池<br>如果“str”+”str”直接相加，编译器会优化直接拼接后在赋值<br><img src="/assets/071-String%E7%9A%84%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123203822098.png"></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> com.Ethan.L;  </span><br><span class="line">  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">Main</span> &#123;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">main</span><span class="params">(String[] args)</span> &#123;  </span><br><span class="line"><span class="type">String</span> <span class="variable">name</span> <span class="operator">=</span> <span class="string">&quot;com.&quot;</span>+<span class="string">&quot;Ethan.&quot;</span>+<span class="string">&quot;L&quot;</span>;  </span><br><span class="line"><span class="type">String</span> <span class="variable">cname</span> <span class="operator">=</span> <span class="string">&quot;com.Ethan.L&quot;</span>;  </span><br><span class="line">System.out.println(cname == name);  </span><br><span class="line">&#125;  </span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//--------------------------------------------</span></span><br><span class="line"><span class="comment">//上面.java程序的.class文件</span></span><br><span class="line"><span class="keyword">package</span> com.Ethan.L;  </span><br><span class="line">  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">Main</span> &#123;  </span><br><span class="line"><span class="keyword">public</span> <span class="title function_">Main</span><span class="params">()</span> &#123;  </span><br><span class="line">&#125;  </span><br><span class="line">  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">main</span><span class="params">(String[] args)</span> &#123;  </span><br><span class="line"><span class="type">String</span> <span class="variable">name</span> <span class="operator">=</span> <span class="string">&quot;com.Ethan.L&quot;</span>;  </span><br><span class="line"><span class="type">String</span> <span class="variable">cname</span> <span class="operator">=</span> <span class="string">&quot;com.Ethan.L&quot;</span>;  </span><br><span class="line">System.out.println(cname == name);  </span><br><span class="line">&#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
