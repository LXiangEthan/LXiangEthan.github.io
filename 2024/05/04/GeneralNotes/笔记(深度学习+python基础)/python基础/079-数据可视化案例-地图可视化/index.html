<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">from</span> pyecharts.charts <span class="keyword">import</span> Map</span><br><span class="line"><span class="keyword">from</span> pyecharts.options <span class="keyword">import</span> VisualMapOpts</span><br><span class="line"><span class="built_in">map</span> = Map()</span><br><span class="line"></span><br><span class="line">data = [</span><br><span class="line">    (<span class="string">&quot;北京市&quot;</span>,<span class="number">99</span>),</span><br><span class="line">    (<span class="string">&quot;上海市&quot;</span>,<span class="number">199</span>),</span><br><span class="line">    (<span class="string">&quot;天津市&quot;</span>,<span class="number">100</span>),</span><br><span class="line">    (<span class="string">&quot;山东省&quot;</span>,<span class="number">300</span>),</span><br><span class="line">    (<span class="string">&quot;河南省&quot;</span>,<span class="number">150</span>)</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line"><span class="built_in">map</span>.add(<span class="string">&quot;测试地图&quot;</span>,data,<span class="string">&quot;china&quot;</span>)</span><br><span class="line"><span class="comment"># 三个参数分别表示地图的名称，地图显示的数据，地图类型，中国地图是china</span></span><br><span class="line"><span class="built_in">map</span>.set_global_opts(</span><br><span class="line">    visualmap_opts=VisualMapOpts(</span><br><span class="line">        is_show=<span class="literal">True</span>,</span><br><span class="line">        is_piecewise=<span class="literal">True</span>,</span><br><span class="line">        <span class="comment"># 开启手动校准范围</span></span><br><span class="line">        pieces=[</span><br><span class="line">            &#123;<span class="string">&#x27;min&#x27;</span>:<span class="number">1</span>,<span class="string">&#x27;max&#x27;</span>:<span class="number">9</span>,<span class="string">&#x27;label&#x27;</span>:<span class="string">&#x27;1-9&#x27;</span>,<span class="string">&#x27;color&#x27;</span>:<span class="string">&#x27;#FF0000&#x27;</span>&#125;,</span><br><span class="line">            &#123;<span class="string">&#x27;min&#x27;</span>:<span class="number">10</span>,<span class="string">&#x27;max&#x27;</span>:<span class="number">99</span>,<span class="string">&#x27;label&#x27;</span>:<span class="string">&#x27;10-99&#x27;</span>,<span class="string">&#x27;color&#x27;</span>:<span class="string">&#x27;#00FF00&#x27;</span>&#125;,</span><br><span class="line">            &#123;<span class="string">&#x27;min&#x27;</span>:<span class="number">100</span>,<span class="string">&#x27;max&#x27;</span>:<span class="number">999</span>,<span class="string">&#x27;label&#x27;</span>:<span class="string">&#x27;100-999&#x27;</span>,<span class="string">&#x27;color&#x27;</span>:<span class="string">&#x27;#0000FF&#x27;</span>&#125;,</span><br><span class="line">            &#123;<span class="string">&#x27;min&#x27;</span>:<span class="number">1000</span>,<span class="string">&#x27;max&#x27;</span>:<span class="number">9999</span>,<span class="string">&#x27;label&#x27;</span>:<span class="string">&#x27;1000-9999&#x27;</span>,<span class="string">&#x27;color&#x27;</span>:<span class="string">&#x27;#FFFFFF&#x27;</span>&#125;</span><br><span class="line">        ]</span><br><span class="line"></span><br><span class="line">    )</span><br><span class="line">    <span class="comment"># 设置视觉映射</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="built_in">map</span>.render()</span><br></pre></td></tr></table></figure>
