="comment">//使用引用返回方便再次赋值  </span></span><br><span class="line"><span class="keyword">return</span> <span class="keyword">this</span>-&gt;pAddress[index];  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">getCapacity</span><span class="params">()</span></span>&#123;  </span><br><span class="line"><span class="keyword">return</span> <span class="keyword">this</span>-&gt;myCapacity;  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">getSize</span><span class="params">()</span></span>&#123;  </span><br><span class="line"><span class="keyword">return</span> <span class="keyword">this</span>-&gt;mySize;  </span><br><span class="line">&#125;  </span><br><span class="line">  </span><br><span class="line">~<span class="built_in">myArray</span>()&#123;  </span><br><span class="line"><span class="keyword">if</span>(<span class="keyword">this</span>-&gt;pAddress!=<span class="literal">NULL</span>)&#123;  </span><br><span class="line"><span class="keyword">delete</span>[] <span class="keyword">this</span>-&gt;pAddress;  </span><br><span class="line"><span class="keyword">this</span>-&gt;pAddress = <span class="literal">NULL</span>;  </span><br><span class="line"><span class="comment">// cout&lt;&lt;&quot;myArray的析构函数调用&quot;&lt;&lt;endl;  </span></span><br><span class="line">&#125;  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="keyword">private</span>:  </span><br><span class="line">T* pAddress; <span class="comment">//指向堆区开辟的真实数组  </span></span><br><span class="line"><span class="type">int</span> myCapacity;  </span><br><span class="line"><span class="type">int</span> mySize;  </span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure>
