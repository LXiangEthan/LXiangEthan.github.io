n class="function"><span class="type">void</span> <span class="title">printMap</span><span class="params">(map&lt;<span class="type">int</span>,<span class="type">int</span>&gt;m)</span></span>&#123;  </span><br><span class="line"><span class="keyword">for</span>(map&lt;<span class="type">int</span>,<span class="type">int</span>&gt;::iterator it = m.<span class="built_in">begin</span>();it!=m.<span class="built_in">end</span>();it++)&#123;  </span><br><span class="line">cout&lt;&lt;it-&gt;first&lt;&lt;<span class="string">&quot;： &quot;</span>;  </span><br><span class="line">cout&lt;&lt;it-&gt;second&lt;&lt;<span class="string">&quot; ；&quot;</span>;  </span><br><span class="line">&#125;  </span><br><span class="line">cout&lt;&lt;endl;  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">test</span><span class="params">()</span> </span>&#123;  </span><br><span class="line">map&lt;<span class="type">int</span>,<span class="type">int</span>&gt; m;  </span><br><span class="line">m.<span class="built_in">insert</span>(<span class="built_in">pair</span>&lt;<span class="type">int</span>,<span class="type">int</span>&gt;(<span class="number">1</span>,<span class="number">10</span>));  </span><br><span class="line">m.<span class="built_in">insert</span>(<span class="built_in">pair</span>&lt;<span class="type">int</span>,<span class="type">int</span>&gt;(<span class="number">2</span>,<span class="number">30</span>));  </span><br><span class="line">m.<span class="built_in">insert</span>(<span class="built_in">pair</span>&lt;<span class="type">int</span>,<span class="type">int</span>&gt;(<span class="number">3</span>,<span class="number">40</span>));  </span><br><span class="line">m.<span class="built_in">insert</span>(<span class="built_in">pair</span>&lt;<span class="type">int</span>,<span class="type">int</span>&gt;(<span class="number">4</span>,<span class="number">50</span>));  </span><br><span class="line">m.<span class="built_in">insert</span>(<span class="built_in">pair</span>&lt;<span class="type">int</span>,<span class="type">int</span>&gt;(<span class="number">5</span>,<span class="number">20</span>));  </span><br><span class="line">m.<span class="built_in">insert</span>(<span class="built_in">pair</span>&lt;<span class="type">int</span>,<span class="type">int</span>&gt;(<span class="number">6</span>,<span class="number">12</span>));  </span><br><span class="line"><span class="keyword">if</span>(m.<span class="built_in">empty</span>())&#123;  </span><br><span class="line">cout&lt;&lt;<span class="string">&quot;m这个mapo容器为空&quot;</span>&lt;&lt;endl;  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="keyword">else</span>&#123;  </span><br><span class="line">cout&lt;&lt;<span class="string">&quot;m不为空&quot;</span>&lt;&lt;endl;  </span><br><span class="line"><span class="built_in">printMap</span>(m);  </span><br><span class="line">cout&lt;&lt;<span class="string">&quot;m的大小为：&quot;</span>&lt;&lt;m.<span class="built_in">size</span>()&lt;&lt;endl;  </span><br><span class="line">&#125;  </span><br><span class="line">  </span><br><span class="line">map&lt;<span class="type">int</span>,<span class="type">int</span>&gt; m1;  </span><br><span class="line">m1.<span class="built_in">insert</span>(<span class="built_in">pair</span>&lt;<span class="type">int</span>,<span class="type">int</span>&gt;(<span class="number">1</span>,<span class="number">100</span>));  </span><br><span class="line">m1.<span class="built_in">insert</span>(<span class="built_in">pair</span>&lt;<span class="type">int</span>,<span class="type">int</span>&gt;(<span class="number">2</span>,<span class="number">300</span>));  </span><br><span class="line">m1.<span class="built_in">insert</span>(<span class="built_in">pair</span>&lt;<span class="type">int</span>,<span class="type">int</span>&gt;(<span class="number">3</span>,<span class="number">400</span>));  </span><br><span class="line">m1.<span class="built_in">insert</span>(<span class="built_in">pair</span>&lt;<span class="type">int</span>,<span class="type">int</span>&gt;(<span class="number">4</span>,<span class="number">500</span>));  </span><br><span class="line">m1.<span class="built_in">insert</span>(<span class="built_in">pair</span>&lt;<span class="type">int</span>,<span class="type">int</span>&gt;(<span class="number">5</span>,<span class="number">200</span>));  </span><br><span class="line">m1.<span class="built_in">insert</span>(<span class="built_in">pair</span>&lt;<span class="type">int</span>,<span class="type">int</span>&gt;(<span class="number">6</span>,<span class="number">120</span>));  </span><br><span class="line">cout&lt;&lt;<span class="string">&quot;交换前：&quot;</span>&lt;&lt;endl;  </span><br><span class="line">cout&lt;&lt;<span class="string">&quot;m:&quot;</span>;<span class="built_in">printMap</span>(m);  </span><br><span class="line">cout&lt;&lt;<span class="string">&quot;m1:&quot;</span>;<span class="built_in">printMap</span>(m1);  </span><br><span class="line"><span class="built_in">swap</span>(m,m1);  </span><br><span class="line">cout&lt;&lt;<span class="string">&quot;交换后：&quot;</span>&lt;&lt;endl;  </span><br><span class="line">cout&lt;&lt;<span class="string">&quot;m:&quot;</span>;<span class="built_in">printMap</span>(m);  </span><br><span class="line">cout&lt;&lt;<span class="string">&quot;m1:&quot;</span>;<span class="built_in">printMap</span>(m1);  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;  </span><br><span class="line"><span class="built_in">system</span>(<span class="string">&quot;chcp 65001&quot;</span>);  </span><br><span class="line"><span class="built_in">test</span>();  </span><br><span class="line"><span class="keyword">return</span> <span class="number">0</span>
