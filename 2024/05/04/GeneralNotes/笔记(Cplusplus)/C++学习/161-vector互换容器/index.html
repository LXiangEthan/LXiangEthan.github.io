<figure class="highlight c++"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;iostream&gt;</span>  </span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span><span class="string">&lt;vector&gt;</span>  </span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;  </span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">printVector</span><span class="params">(vector&lt;<span class="type">int</span>&gt;&amp;v)</span></span>&#123;  </span><br><span class="line"><span class="keyword">for</span>(vector&lt;<span class="type">int</span>&gt;::iterator it = v.<span class="built_in">begin</span>();it != v.<span class="built_in">end</span>();it++)&#123;  </span><br><span class="line">cout&lt;&lt;*it&lt;&lt;<span class="string">&quot; &quot;</span>;  </span><br><span class="line">&#125;  </span><br><span class="line">cout&lt;&lt;endl;  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">test</span><span class="params">()</span></span>&#123;  </span><br><span class="line">vector &lt;<span class="type">int</span>&gt;v1;  </span><br><span class="line">cout&lt;&lt;<span class="string">&quot;交换前&quot;</span>&lt;&lt;endl;  </span><br><span class="line"><span class="keyword">for</span>(<span class="type">int</span> i = <span class="number">0</span>;i &lt; <span class="number">10</span>;i++)&#123;  </span><br><span class="line">v1.<span class="built_in">push_back</span>(i);  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="built_in">printVector</span>(v1);  </span><br><span class="line">vector &lt;<span class="type">int</span>&gt;v2;  </span><br><span class="line"><span class="keyword">for</span>(<span class="type">int</span> i = <span class="number">0</span>;i &lt; <span class="number">10</span>;i++)&#123;  </span><br><span class="line">v2.<span class="built_in">push_back</span>(i+<span class="number">10</span>);  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="built_in">printVector</span>(v2);  </span><br><span class="line"><span class="built_in">swap</span>(v1,v2);  </span><br><span class="line">cout&lt;&lt;<span class="string">&quot;交换后&quot;</span>&lt;&lt;endl;  </span><br><span class="line"><span class="built_in">printVector</span>(v1);  </span><br><span class="line"><span class="built_in">printVector</span>(v2);  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">test02</span><span class="params">()</span></span>&#123;  </span><br><span class="line">vector&lt;<span class="type">int</span>&gt; v;  </span><br><span class="line"><span class="comment">//实际用途，巧用swap，可以收缩内存  </span></span><br><span class="line"><span class="keyword">for</span>(<span class="type">int</span> i = <span class="number">0</span>;i &lt; <span class="number">100000</span>;i++)&#123;  </span><br><span class="line">v.<span class="built_in">push_back</span>(i);  </span><br><span class="line">&#125;  </span><br><span class="line">cout&lt;&lt;v.<span class="built_in">size</span>()&lt;&lt;endl;  </span><br><span class="line">cout&lt;&lt;v.<span class="built_in">capacity</span>()&lt;&lt;endl;  </span><br><span class="line"><span class="comment">//100000 130000  </span></span><br><span class="line">  </span><br><span class="line">v.<span class="built_in">resize</span>(<span class="number">3</span>);  </span><br><span class="line">cout&lt;&lt;v.<span class="built_in">size</span>()&lt;&lt;endl;  </span><br><span class="line"><span class="comment">//重新设置大小后vector容器的容量没有变小，浪费了很短空间  </span></span><br><span class="line">cout&lt;&lt;v.<span class="built_in">capacity</span>()&lt;&lt;endl;  </span><br><span class="line"><span class="comment">//3 130000  </span></span><br><span class="line">  </span><br><span class="line"><span class="built_in">vector</span>&lt;<span class="type">int</span>&gt;(v).<span class="built_in">swap</span>(v);  </span><br><span class="line">cout&lt;&lt;v.<span class="built_in">size</span>()&lt;&lt;endl;  </span><br><span class="line">cout&lt;&lt;v.<span class="built_in">capacity</span>()&lt;&lt;endl;  </span><br><span class="line"><span class="comment">//3 3  </span></span><br><span class="line"><span class="comment">//原理：这里的vector&lt;int&gt;(v)是一个匿名对象，调用拷贝构造函数，然后互换元素swap之后，做了一个容器交换，就是地址交换，这时候的v的容量就是3了，匿名对象执行完会被自动回收  </span></span><br><span class="line">&#125;  </span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;  </span><br><span class="line"><span class="built_in">system</span>(<span class="string">&quot;chcp 65001&quot;</span>);  </span><br><span class="line"><span class="comment">// test();  </span></span><br><span class="line"><span class="built_in">test02</span>();  </span><br><span class="line"><span class="keyword">return</span> <span class="number">0</span>;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<p>匿名对象在&#x3D;&#x3D;107-函数调用运算符重载&#x3D;&#x3D;中有讲到</p>
