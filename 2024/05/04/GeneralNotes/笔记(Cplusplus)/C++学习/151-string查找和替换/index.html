        <p><img src="/assets/151-string%E6%9F%A5%E6%89%BE%E5%92%8C%E6%9B%BF%E6%8D%A2/Pasted%20image%2020231105160756.png"></p>
<figure class="highlight c++"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;iostream&gt;</span>  </span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span><span class="string">&lt;string&gt;</span>  </span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;  </span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">test</span><span class="params">()</span></span>&#123;  </span><br><span class="line"><span class="comment">//下面所有的方法都可以传一个pos参数，表示从哪里开始查找  </span></span><br><span class="line">string str1 = <span class="string">&quot;abcdefg&quot;</span>;  </span><br><span class="line"><span class="type">int</span> pos = str1.<span class="built_in">find</span>(<span class="string">&quot;de&quot;</span>);  </span><br><span class="line"><span class="comment">//查找到字符串第一个“de”中&quot;d&quot;的位置,没有找到就返回-1  </span></span><br><span class="line">cout&lt;&lt;pos&lt;&lt;endl;  </span><br><span class="line">  </span><br><span class="line"><span class="type">int</span> pos2 = str1.<span class="built_in">rfind</span>(<span class="string">&quot;de&quot;</span>);  </span><br><span class="line"><span class="comment">//rfind和find的区别是rfind是从右往左查，而find是从左往右查找  </span></span><br><span class="line">cout&lt;&lt;pos&lt;&lt;endl;  </span><br><span class="line">  </span><br><span class="line"><span class="comment">//替换  </span></span><br><span class="line">str1.<span class="built_in">replace</span>(<span class="number">1</span>,<span class="number">3</span>,<span class="string">&quot;111&quot;</span>);  </span><br><span class="line"><span class="comment">//从1号位置替换原来的3个字符,后面无论指定多少个字符，全部替换，只不过原来的是三个字符的替换  </span></span><br><span class="line">cout&lt;&lt;str1&lt;&lt;endl;  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;  </span><br><span class="line"><span class="built_in">system</span>(<span class="string">&quot;chcp 65001&quot;</span>);  </span><br><span class="line"><span class="built_in">test</span>();  </span><br><span class="line"><span class="keyword">return</span> <span class="number">0</span>;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
