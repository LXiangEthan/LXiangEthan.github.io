nt</span><span class="params">(<span class="type">int</span> val)</span></span>&#123;  </span><br><span class="line">cout&lt;&lt;val&lt;&lt;endl;  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">test01</span><span class="params">()</span></span>&#123;  </span><br><span class="line"><span class="comment">//创建容器  </span></span><br><span class="line">vector&lt;<span class="type">int</span>&gt; v;  </span><br><span class="line"><span class="comment">//插入元素  </span></span><br><span class="line">v.<span class="built_in">push_back</span>(<span class="number">10</span>);  </span><br><span class="line">v.<span class="built_in">push_back</span>(<span class="number">20</span>);  </span><br><span class="line">v.<span class="built_in">push_back</span>(<span class="number">60</span>);  </span><br><span class="line">v.<span class="built_in">push_back</span>(<span class="number">50</span>);  </span><br><span class="line">v.<span class="built_in">push_back</span>(<span class="number">40</span>);  </span><br><span class="line">v.<span class="built_in">push_back</span>(<span class="number">30</span>);  </span><br><span class="line">  </span><br><span class="line"><span class="comment">//通过迭代器遍历访问容器  </span></span><br><span class="line"><span class="comment">// vector&lt;int&gt;::iterator itBegin = v.begin();//起始迭代器，指向容器中第一个元素  </span></span><br><span class="line"><span class="comment">// vector&lt;int&gt;::iterator itEnd = v.end();//结束迭代器，指向容器中最后一个元素中下一个位置  </span></span><br><span class="line"><span class="comment">//  </span></span><br><span class="line"><span class="comment">// while(itBegin!=itEnd)&#123;  </span></span><br><span class="line"><span class="comment">// cout&lt;&lt;*itBegin&lt;&lt;endl;  </span></span><br><span class="line"><span class="comment">// itBegin++;  </span></span><br><span class="line"><span class="comment">// &#125;\  </span></span><br><span class="line">  </span><
