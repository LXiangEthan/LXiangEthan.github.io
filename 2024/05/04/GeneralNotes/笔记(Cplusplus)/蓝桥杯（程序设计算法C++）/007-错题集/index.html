n class="type">int</span> max = <span class="number">0</span>;</span><br><span class="line">    max = <span class="built_in">Search</span>(power,power_b[num<span class="number">-1</span>]);</span><br><span class="line">    <span class="keyword">if</span>(!<span class="built_in">Search_vector</span>(v[max],<span class="number">2000000</span>))&#123;</span><br><span class="line">        <span class="keyword">for</span>(vector&lt;<span class="type">int</span>&gt;::iterator it = v[max].<span class="built_in">begin</span>();it != v[max].<span class="built_in">end</span>();it++)&#123;</span><br><span class="line"><span class="comment">//            cout&lt;&lt;*it&lt;&lt;endl;</span></span><br><span class="line">            v[*it].<span class="built_in">push_back</span>(<span class="number">2000000</span>);</span><br><span class="line">        &#125;</span><br><span class="line">        v[max].<span class="built_in">push_back</span>(<span class="number">2000000</span>);</span><br><span class="line"><span class="comment">//        cout&lt;&lt;power_b[num-1]&lt;&lt;endl;</span></span><br><span class="line">        <span class="keyword">return</span> <span class="built_in">dfs</span>(num<span class="number">-1</span>) + power_b[num<span class="number">-1</span>];</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> <span class="built_in">dfs</span>(num<span class="number">-1</span>);</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    <span class="type">int</span> num = <span class="number">0</span>;</span><br><span class="line">    cin&gt;&gt;num;</span><br><span class="line">    NUM_B = num;</span><br><span class="line">    v.<span class="built_in">resize</span>(num);</span><br><span class="line">    <span class="keyword">for</span>(<span class="t <span class="keyword">include</span><span class="string">&lt;algorithm&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span><span class="string">&lt;functional&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line">vector&lt;<span class="type">int</span>&gt; the_result;</span><br><span class="line"><span class="type">int</span> n,m;</span><br><span class="line"><span class="keyword">class</span> <span class="title class_">greaters</span>&#123;</span><br><span class="line">    <span class="keyword">public</span>:</span><br><span class="line">      <span class="function"><span class="type">bool</span> <span class="title">operator</span><span class="params">()</span><span class="params">(<span class="type">int</span> a,<span class="type">int</span> b)</span></span>&#123;</span><br><span class="line">          <span class="keyword">return</span> a&lt;b;</span><br><span class="line">      &#125;</span><br><span class="line">&#125;;</span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    cin&gt;&gt;n&gt;&gt;m;</span><br><span class="line">    vector&lt;vector&lt;<span class="type">int</span>&gt;&gt; matrix;</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i = <span class="number">0</span>;i &lt; n;i++)&#123;</span><br><span class="line">        vector&lt;<span class="type">int</span>&gt; temp;</span><br><span class="line">        <span class="keyword">for</span>(<span class="type">int</span> j = <span class="number">0</span>;j &lt; m;j++)&#123;</span><br><span class="line">            <span class="type">int</span> num;</span><br><span class="line">            <span class="built_in">scanf</span>(<span class="string">&quot;%d&quot;</span>,&amp;num);
