">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br><span class="line">139</span><br><span class="line">140</span><br><span class="line">141</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;mainwindow.h&quot;</span></span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">include</span><span class="string">&lt;QMenuBar&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">include</span><span class="string">&lt;QToolBar&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">include</span><span class="string">&lt;QPushButton&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">include</span><span class="string">&lt;QStatusBar&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">include</span><span class="string">&lt;QLabel&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">include</span><span class="string">&lt;QDockWidget&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">include</span><span class="string">&lt;QTextEdit&gt;</span></span></span><br><span class="line"></span><br><span class="line">MainWindow::<span class="built_in">MainWindow</span>(QWidget *parent)</span><br><span class="line"></span><br><span class="line">    : <span class="built_in">QMainWindow</span>(parent)</span><br><span class="line"></span><br><span class="line">&#123;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">this</span>-&gt;<span class="built_in">resize</span>(<span class="number">500</span>,<span class="number">500</span>);</span><br><span class="line"></span><br><span class="line">    <span class="comment">//菜单栏创建</span></span><br><span class="line"></span><br><span class="line">    QMenuBar *bar = <span class="built_in">menuBar</span>();<span class="comment">//=QMenuBar*bar = new QMenuBar;</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">//将菜单栏放入窗口中,菜单栏最多只能有一个</span></span><br><span class="line"></span><br><span class="line">    <span class="built_in">setMenuBar</span>(bar);</span><br><span class="line"></span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">    <span class="comment">//创建菜单选项</span></span><br><span class="line"></span><br><span class="line">    QMenu*fileMenu = bar-&gt;<span class="built_in">addMenu</span>(<span class="string">&quot;文件&quot;</span>);</span><br><span class="line"></span><br><span class="line">    QMenu*editMenu = bar-&gt;<span class="built_in">addMenu</span>(<span class="string">&quot;编辑&quot;</span>);</span><br><span class="line"></span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">    <span class="comment">//创建菜单项</span></span><br><span class="line"></span><br><span class="line">    fileMenu-&gt;<span class="built_in">addAction</span>(<span class="string">&quot;新建&quot;</span>);</span><br><span class="line"></span><br><span class="line">    fileMenu-&gt;<span class="built_in">addSeparator</span>();</span><br><span class="line"></span><br><span class="line">    fileMenu-&gt;<span class="built_in">addAction</span>(<span class="string">&quot;打开&quot;</span>);</span><br><span class="line"></span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">    <span class="comment">//创建工具栏，可以有多个s</span></span><br><span class="line"></span><br><span class="line">    QToolBar *tbar = <span class="keyword">new</span> <span class="built_in">QToolBar</span>(<span class="keyword">this</span>);</span><br><span class="line"></span><br><span class="line">    <span class="built_in">addToolBar</span>(Qt::LeftToolBarArea,tbar);</span><br><span class="line"></span><br><span class="line">    <span class="comment">//只允许左右停靠</span></span><br><span class="line"></span><br><span class="line">    tbar-&gt;<span class="built_in">setAllowedAreas</span>(Qt::LeftToolBarArea | Qt::RightToolBarArea);</span><br><span class="line"></span><br><span class="line">    <span class="comment">//设置浮动</span></span><br><span class="line"></span><br><span class="line">    tbar-&gt;<span class="built_in">setFloatable</span>(<span class="literal">false</span>);</span><br><span class="line"></span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">    <span class="comment">//设置移动</span></span><br><span class="line"></span><br><span class="line">    tbar-&gt;<span class="built_in">setMovable</span>(<span class="literal">false</span>);</span><br><span class="line"></span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">    <span class="comment">//设置工具栏的内容</span></span><br><span class="line"></span><br><span class="line">    QAction*open = tbar-&gt;<span class="built_in">addAction</span>(<span class="string">&quot;打开&quot;</span>);</span><br><span class="line"></span><br><span class="line">    QAction*newn = tbar-&gt;<span class="built_in">addAction</span>(<span class="string">&quot;新建&quot;</span>);</span><br><span class="line"></span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">    tbar-&gt;<span class="built_in">addAction</span>(open);</span><br><span class="line"></span><br><span class="line">    tbar-&gt;<span class="built_in">addSeparator</span>();</span><br><span class="line"></span><br><span class="line">    tbar-&gt;<span class="built_in">addAction</span>(newn);</span><br><span class="line"></span><br><span class="line">    <span class="comment">//工具栏中添加控件</span></span><br><span class="line"></span><br><span class="line">    QPushButton*qbtn = <span class="keyword">new</span> QPushButton;</span><br><span class="line"></span><br><span class="line">    qbtn-&gt;<span class="built_in">setText</span>(<span class="string">&quot;按钮&quot;</span>);</span><br><span class="line"></span><br><span class="line">    tbar-&gt;<span class="built_in">addWidget</span>(qbtn);</span><br><span class="line"></span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">    <span class="comment">//状态栏创建，最多有一个</span></span><br><span class="line"></span><br><span class="line">    QStatusBar*stBar = <span class="keyword">new</span> <span class="built_in">QStatusBar</span>();</span><br><span class="line"></span><br><span class="line">    <span class="built_in">setStatusBar</span>(stBar);</span><br><span class="line"></span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">    <span class="comment">//放标签控件</span></span><br><span class="line"></span><br><span class="line">    QLabel*label1 = <span class="keyword">new</span> <span class="built_in">QLabel</span>(<span class="string">&quot;左侧提示信息&quot;</span>,<span class="keyword">this</span>);</span><br><span class="line"></span><br><span class="line">    stBar-&gt;<span class="built_in">addWidget</span>(label1);</span><br><span class="line"></span><br><span class="line">    QLabel*label2 = <span class="keyword">new</span> <span class="built_in">QLabel</span>(<span class="string">&quot;右侧提示信息&quot;</span>,<span class="keyword">this</span>);</span><br><span class="line"></span><br><span class="line">    stBar-&gt;<span class="built_in">addPermanentWidget</span>(label2);</span><br><span class="line"></span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">    <span class="comment">//铆接部件（浮动窗口）可以有多个,铆接窗口时依据核心位置的</span></span><br><span class="line"></span><br><span class="line">    QDockWidget*dw = <span class="keyword">new</span> <span class="built_in">QDockWidget</span>(<span class="string">&quot;浮动&quot;</span>,<span class="keyword">this</span>);</span><br><span class="line"></span><br><span class="line">    <span class="built_in">addDockWidget</span>(Qt::BottomDockWidgetArea,dw);</span><br><span class="line"></span><br><span class="line">    <span class="comment">//设置浮动窗口后期停靠，只允许停靠上</span></span><br><span class="line"></span><br><span class="line">    dw-&gt;<span class="built_in">setAllowedAreas</span>(Qt::TopDockWidgetArea | Qt::BottomDockWidgetArea);</span><br><span class="line"></span><br><span class="line">    QTextEdit*texte = <span class="keyword">new</span> <span class="built_in">QTextEdit</span>(<span class="keyword">this</span>);</span><br><span class="line"></span><br><span class="line">    <span class="built_in">setCentralWidget</span>(texte);</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">MainWindow::~<span class="built_in">MainWindow</span>()</span><br><span class="line"></span><br><span class="line">&#123;</span><br><span class="line"></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
