 </span><br><span class="line"><span class="type">Scanner</span> <span class="variable">scanner</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">Scanner</span>(System.in);  </span><br><span class="line"><span class="type">int</span> <span class="variable">data</span> <span class="operator">=</span> scanner.nextInt();  </span><br><span class="line"><span class="keyword">while</span>(data != num)&#123;  </span><br><span class="line"><span class="keyword">if</span>(data &gt; num)&#123;  </span><br><span class="line">System.out.println(<span class="string">&quot;猜大了,再猜一次&quot;</span>);  </span><br><span class="line">data = scanner.nextInt();  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="keyword">else</span>&#123;  </span><br><span class="line">System.out.println(<span class="string">&quot;猜小了，再猜一次&quot;</span>);  </span><br><span class="line">data = scanner.nextInt();  </span><br><span class="line">&#125;  </span><br><span class="line">&#125;  </span><br><span class="line">System.out.println(<span class="string">&quot;猜对了&quot;</span>);  </span><br><span class="line">&#125;  </span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//升车指定范围内的随机数</span></span><br><span class="line"><span class="comment">//Random r = new Random();</span></span><br><span class="line"><span class="comment">//int data = r.nextInt(10,30);</span></span><br></pre></td></tr></table></figure>
