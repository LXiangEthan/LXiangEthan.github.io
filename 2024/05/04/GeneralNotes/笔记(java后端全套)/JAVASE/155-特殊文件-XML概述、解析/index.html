<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> Pac;  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line"><span class="keyword">import</span> org.dom4j.Attribute;  </span><br><span class="line"><span class="keyword">import</span> org.dom4j.Document;  </span><br><span class="line"><span class="keyword">import</span> org.dom4j.DocumentException;  </span><br><span class="line"><span class="keyword">import</span> org.dom4j.Element;  </span><br><span class="line"><span class="keyword">import</span> org.dom4j.io.SAXReader;  </span><br><span class="line">  </span><br><span class="line"><span class="keyword">import</span> javax.lang.model.util.Elements;  </span><br><span class="line"><span class="keyword">import</span> java.util.List;  </span><br><span class="line">  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">Main</span> &#123;  </span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">main</span><span class="params">(String[] args)</span> <span class="keyword">throws</span> DocumentException &#123;  </span><br><span class="line">        <span class="type">SAXReader</span> <span class="variable">saxr</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">SAXReader</span>();  </span><br><span class="line">        <span class="type">Document</span> <span class="variable">document</span> <span class="operator">=</span> saxr.read(<span class="string">&quot;src/Files/demo_1.xml&quot;</span>);  </span><br><span class="line">        <span class="type">Element</span> <span class="variable">root</span> <span class="operator">=</span> document.getRootElement();<span class="comment">//获取根元素对象  </span></span><br><span class="line">        System.out.println(root.getName());  </span><br><span class="line">  </span><br><span class="line">        <span class="comment">//获取一级子元素  </span></span><br><span class="line"><span class="comment">//        List&lt;Element&gt; elments = root.elements();  </span></span><br><span class="line">        List&lt;Element&gt; elments = root.elements(<span class="string">&quot;user&quot;</span>);  </span><br><span class="line"><span class="comment">//        for(Element el : elments)&#123;  </span></span><br><span class="line"><span class="comment">//            System.out.println(el.getText());  </span></span><br><span class="line"><span class="comment">//        &#125;  </span></span><br><span class="line">        <span class="comment">//如果出现多个同名标签，默认只拿到第一个  </span></span><br><span class="line">        <span class="type">Element</span> <span class="variable">people</span> <span class="operator">=</span> root.element(<span class="string">&quot;people&quot;</span>);  </span><br><span class="line">        System.out.println(people.getText());<span class="comment">//获取标签内部信息  </span></span><br><span class="line">  </span><br><span class="line">        <span class="type">Element</span> <span class="variable">user</span> <span class="operator">=</span> root.element(<span class="string">&quot;user&quot;</span>);  </span><br><span class="line">        System.out.println(user.elementText(<span class="string">&quot;time&quot;</span>));<span class="comment">//获取当前dom对象下的标签中是time标签的文本内容  </span></span><br><span class="line">        System.out.println(user.attributeValue(<span class="string">&quot;id&quot;</span>));  </span><br><span class="line">        <span class="type">Attribute</span> <span class="variable">id</span> <span class="operator">=</span> user.attribute(<span class="string">&quot;id&quot;</span>);<span class="comment">//拿到属性对象  </span></span><br><span class="line">        System.out.println(id.getName());  </span><br><span class="line">        System.out.println(id.getValue());  </span><br><span class="line">  </span><br><span class="line">        List&lt;Attribute&gt; la = user.attributes();<span class="comment">//获取所有属性放到List集合中  </span></span><br><span class="line">        <span class="keyword">for</span>(Attribute a : la)&#123;  </span><br><span class="line">            System.out.println(a.getName()+<span class="string">&quot;=&quot;</span>+a.getValue());  </span><br><span class="line">        &#125;  </span><br><span class="line">  </span><br><span class="line"><span class="comment">//        获取当前元素下的子元素的文本内容  </span></span><br><span class="line">        System.out.println(user.elementText(<span class="string">&quot;name&quot;</span>));  </span><br><span class="line">        System.out.println(user.elementText(<span class="string">&quot;age&quot;</span>));  </span><br><span class="line">  </span><br><span class="line">        <span class="type">Element</span> <span class="variable">time</span> <span class="operator">=</span> user.element(<span class="string">&quot;time&quot;</span>);  </span><br><span class="line">        System.out.println(time.getText());<span class="comment">//这样直接取出来的数据是前后会有空格  </span></span><br><span class="line">        System.out.println(time.getTextTrim());<span class="comment">//这种方式取出来的数据就没有空格  </span></span><br><span class="line">    &#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
