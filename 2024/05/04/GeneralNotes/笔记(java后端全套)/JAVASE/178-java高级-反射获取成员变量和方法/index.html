        <p><img src="/assets/178-java%E9%AB%98%E7%BA%A7-%E5%8F%8D%E5%B0%84%E8%8E%B7%E5%8F%96%E6%88%90%E5%91%98%E5%8F%98%E9%87%8F%E5%92%8C%E6%96%B9%E6%B3%95/image-20240328185003164.png"></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> Constructor;  </span><br><span class="line">  </span><br><span class="line"><span class="keyword">import</span> org.junit.Test;  </span><br><span class="line">  </span><br><span class="line"><span class="keyword">import</span> java.lang.reflect.Field;  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">TestConstructor</span> &#123;  </span><br><span class="line">    <span class="meta">@Test</span>  </span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">void</span> <span class="title function_">test</span><span class="params">()</span> <span class="keyword">throws</span> Exception &#123;  </span><br><span class="line">        <span class="type">Main</span> <span class="variable">m</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">Main</span>(<span class="number">111</span>,<span class="string">&quot;lx&quot;</span>,<span class="number">22.2</span>);  </span><br><span class="line">        <span class="type">Class</span> <span class="variable">c</span> <span class="operator">=</span> Main.class;  </span><br><span class="line">        Field[] fs = c.getDeclaredFields();<span class="comment">//获取全部成员变量，不管权限修饰符  </span></span><br><span class="line">        <span class="keyword">for</span>(Field f : fs)&#123;  </span><br><span class="line">            System.out.println(f.getName()+<span class="string">&quot;---&gt;&quot;</span> + f.getType());  </span><br><span class="line">        &#125;  </span><br><span class="line">  </span><br><span class="line">        <span class="type">Field</span> <span class="variable">f_1</span> <span class="operator">=</span> c.getDeclaredField(<span class="string">&quot;name&quot;</span> );<span class="comment">//获取单个成员变量对象  </span></span><br><span class="line">        System.out.println(f_1.getName() +<span class="string">&quot;----&gt;&quot;</span>+ f_1.getType());  </span><br><span class="line">  </span><br><span class="line">        <span class="type">Field</span> <span class="variable">f_2</span> <span class="operator">=</span> c.getDeclaredField(<span class="string">&quot;age&quot;</span> );  </span><br><span class="line">        System.out.println(f_2.getName() +<span class="string">&quot;----&gt;&quot;</span>+ f_2.getType());  </span><br><span class="line">  </span><br><span class="line">        <span class="type">Field</span> <span class="variable">f_demo</span> <span class="operator">=</span> c.getDeclaredField(<span class="string">&quot;demo&quot;</span>);  </span><br><span class="line">        <span class="comment">//给某个对象的成员变量赋值  </span></span><br><span class="line">        f_1.set(m,<span class="string">&quot;nnnnnnn&quot;</span>);<span class="comment">//给静态变量赋值，第一个参数的对象换成类对象  </span></span><br><span class="line">        f_demo.set(c,<span class="number">1000000</span>);<span class="comment">//给某个对象的成员变量赋值  </span></span><br><span class="line">        System.out.println(f_1.get(m));  </span><br><span class="line">        System.out.println(f_demo.get(c));  </span><br><span class="line">    &#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<span class="comment">//获取有参数的成员方法  </span></span><br><span class="line">        System.out.println(mq.getName()+<span class="string">&quot;----&gt;&quot;</span>+mq.getParameterCount()+<span class="string">&quot;-----&gt;&quot;</span>+mq.getReturnType());  </span><br><span class="line">        <span class="comment">//禁止检查权限  </span></span><br><span class="line">        mw.setAccessible(<span class="literal">true</span>);  </span><br><span class="line">        <span class="type">int</span> <span class="variable">s</span> <span class="operator">=</span> (<span class="type">int</span>) mw.invoke(m);  </span><br><span class="line">        System.out.println(s);  </span><br><span class="line">  </span><br><span class="line">        mq.setAccessible(<span class="literal">true</span>);  </span><br><span class="line">        mq.invoke(m,<span class="string">&quot;hellooooooo&quot;</span>);  </span><br><span class="line">        System.out.println(m.getName());  </span><br><span class="line">    &#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
