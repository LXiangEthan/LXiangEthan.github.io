        <section id="main"><article id="post-GeneralNotes/笔记(java后端全套)/JAVASE/078-static修饰成员变量" class="h-entry article article-type-post" itemprop="blogPost" itemscope itemtype="https://schema.org/BlogPosting">
  <div class="article-meta">
    <a href="/2024/05/04/GeneralNotes/%E7%AC%94%E8%AE%B0(java%E5%90%8E%E7%AB%AF%E5%85%A8%E5%A5%97)/JAVASE/078-static%E4%BF%AE%E9%A5%B0%E6%88%90%E5%91%98%E5%8F%98%E9%87%8F/" class="article-date">

</a>

    <div class="e-content article-entry" itemprop="articleBody">
      
        <p><img src="/assets/078-static%E4%BF%AE%E9%A5%B0%E6%88%90%E5%91%98%E5%8F%98%E9%87%8F/image-20231129212839397.png"></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> com.Ethan.L;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">Main</span> &#123;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">main</span><span class="params">(String[] args)</span> &#123;  </span><br><span class="line">Student.name = <span class="string">&quot;梁响&quot;</span>;  </span><br><span class="line">System.out.println(Student.name);  </span><br><span class="line"><span class="comment">//static修饰的成员变量是类变量，无需实例化就可以访问，该类的所有实例都能访问,这个变量属于所有对象  </span></span><br><span class="line"><span class="type">Student</span> <span class="variable">stu</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">Student</span>();  </span><br><span class="line">stu.age = <span class="number">100</span>;  </span><br><span class="line">stu.name = <span class="string">&quot;lx&quot;</span>;  </span><br><span class="line">System.out.println(Student.name);  </span><br><span class="line">System.out.println(stu.age);  </span><br><span class="line"><span class="comment">//没有static修饰的成员变量是实例变量，只属于单独一个对象  </span></span><br><span class="line">&#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<p><img src="/assets/078-static%E4%BF%AE%E9%A5%B0%E6%88%90%E5%91%98%E5%8F%98%E9%87%8F/image-20231129213719497.png"><br><img src="/assets/078-static%E4%BF%AE%E9%A5%B0%E6%88%90%E5%91%98%E5%8F%98%E9%87%8F/image-20231129213808952.png"><br>注意在同一个类中，访问自己类的类变量才能省略类名不写</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> com.Ethan.L;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">Main</span> &#123;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">main</span><span class="params">(String[] args)</span> &#123;  </span><br><span class="line">Student.num = <span class="number">0</span>;  </span><br><span class="line">Student []stu = <span class="keyword">new</span> <span class="title class_">Student</span>[<span class="number">10</span>];  </span><br><span class="line"><span class="keyword">for</span>(<span class="type">int</span> <span class="variable">i</span> <span class="operator">=</span> <span class="number">0</span>;i &lt; <span class="number">10</span>;i++) &#123;  </span><br><span class="line">stu[i] = <span class="keyword">new</span> <span class="title class_">Student</span>(<span class="string">&quot;lx&quot;</span>,<span class="number">19</span>);  </span><br><span class="line">&#125;  </span><br><span class="line">System.out.println(Student.num);  </span><br><span class="line">&#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">package com.Ethan.L;  </span><br><span class="line">  </span><br><span class="line">public class Student &#123;  </span><br><span class="line">static int num;  </span><br><span class="line">String name;  </span><br><span class="line">int age;  </span><br><span class="line">  </span><br><span class="line">public Student(String name, int age) &#123;  </span><br><span class="line">this.name = name;  </span><br><span class="line">this.age = age;  </span><br><span class="line">this.num++;  </span><br><span class="line">&#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
