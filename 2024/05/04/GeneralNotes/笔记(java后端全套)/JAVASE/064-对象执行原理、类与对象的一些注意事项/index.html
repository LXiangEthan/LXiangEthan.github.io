        <p><img src="/assets/064-%E5%AF%B9%E8%B1%A1%E6%89%A7%E8%A1%8C%E5%8E%9F%E7%90%86%E3%80%81%E7%B1%BB%E4%B8%8E%E5%AF%B9%E8%B1%A1%E7%9A%84%E4%B8%80%E4%BA%9B%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123130327923.png"></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> com.Ethan;  </span><br><span class="line">  </span><br><span class="line"><span class="keyword">class</span> <span class="title class_">Person</span>&#123;  </span><br><span class="line">String name;  </span><br><span class="line"><span class="type">int</span> chinese;  </span><br><span class="line"><span class="type">int</span> math;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title function_">printPerson</span><span class="params">()</span>&#123;  </span><br><span class="line">System.out.println(<span class="string">&quot;语文成绩：&quot;</span>+<span class="built_in">this</span>.chinese);  </span><br><span class="line">System.out.println(<span class="string">&quot;数学成绩：&quot;</span>+<span class="built_in">this</span>.math);  </span><br><span class="line">&#125;  </span><br><span class="line">&#125;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">Main</span> &#123;  </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">main</span><span class="params">(String[] args)</span> &#123;  </span><br><span class="line"><span class="type">Person</span> <span class="variable">p</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">Person</span>();  </span><br><span class="line">p.chinese = <span class="number">90</span>;  </span><br><span class="line">p.math = <span class="number">100</span>;  </span><br><span class="line">p.printPerson();  </span><br><span class="line">System.out.println(p);<span class="comment">//com.Ethan.Person@5b6f7412,表示包名+类名+@+地址  </span></span><br><span class="line">&#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<p><img src="/assets/064-%E5%AF%B9%E8%B1%A1%E6%89%A7%E8%A1%8C%E5%8E%9F%E7%90%86%E3%80%81%E7%B1%BB%E4%B8%8E%E5%AF%B9%E8%B1%A1%E7%9A%84%E4%B8%80%E4%BA%9B%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123130452666.png"><br><img src="/assets/064-%E5%AF%B9%E8%B1%A1%E6%89%A7%E8%A1%8C%E5%8E%9F%E7%90%86%E3%80%81%E7%B1%BB%E4%B8%8E%E5%AF%B9%E8%B1%A1%E7%9A%84%E4%B8%80%E4%BA%9B%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123130559399.png"></p>
<figure class="highlight txt"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">1、类名建议使用英文当次，首字母大写，满足驼峰模式，且要有意义</span><br><span class="line">2、类中定义的变量也称为成员变量（对象的属性），类中定义的方法也称为成员方法（对象的行为）</span><br><span class="line">3、成员变量本身存在默认值，在定义成员变量时一般来说不需要赋初始值</span><br><span class="line">4、一个代码文件中可以写多个class类，但只能有一个public修饰，且public修饰的类名必须成为代码文件名</span><br><span class="line">5、对象与对象之间的数据不会相互影响，但多个变量指向同一个对象就会相互影响</span><br><span class="line">6、如果某个对象没有一个变量引用它，则该对象无法被操作了，该对象会成为所谓的垃圾对象</span><br></pre></td></tr></table></figure>
<p><img src="/assets/064-%E5%AF%B9%E8%B1%A1%E6%89%A7%E8%A1%8C%E5%8E%9F%E7%90%86%E3%80%81%E7%B1%BB%E4%B8%8E%E5%AF%B9%E8%B1%A1%E7%9A%84%E4%B8%80%E4%BA%9B%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123131710777.png"><br><img src="/assets/064-%E5%AF%B9%E8%B1%A1%E6%89%A7%E8%A1%8C%E5%8E%9F%E7%90%86%E3%80%81%E7%B1%BB%E4%B8%8E%E5%AF%B9%E8%B1%A1%E7%9A%84%E4%B8%80%E4%BA%9B%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123131953445.png"><br>Java存在垃圾回收机制，如果对象变成垃圾会自动清除<br><img src="/assets/064-%E5%AF%B9%E8%B1%A1%E6%89%A7%E8%A1%8C%E5%8E%9F%E7%90%86%E3%80%81%E7%B1%BB%E4%B8%8E%E5%AF%B9%E8%B1%A1%E7%9A%84%E4%B8%80%E4%BA%9B%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9/image-20231123132055433.png"></p>
