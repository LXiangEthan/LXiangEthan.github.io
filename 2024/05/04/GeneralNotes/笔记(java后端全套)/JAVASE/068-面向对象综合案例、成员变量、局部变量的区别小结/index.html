<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">成员变量和局部变量的区别</span><br><span class="line"><span class="number">1</span>、类中位置不同：成员变量（类中，方法外）、局部变量（常见于方法中）</span><br><span class="line"><span class="number">2</span>、初始化不同：成员变量（有默认值，不需要初始化赋值），局部变量（没有默认值，使用之前必须要完成赋值）</span><br><span class="line"><span class="number">3</span>、内存中的位置不同，成员变量（存在与堆内存），局部变量（栈内存）</span><br><span class="line"><span class="number">4</span>、作用域不同：成员变量（整个对象），局部变量（在所归属的大括号内）</span><br><span class="line"><span class="number">5</span>、生命周期不同：成员变量（与对象生死与共），局部变量（方法调用而生，方法结束而死）</span><br></pre></td></tr></table></figure>
