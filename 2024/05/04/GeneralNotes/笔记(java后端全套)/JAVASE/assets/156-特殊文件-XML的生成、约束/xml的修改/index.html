lass="line"><span class="keyword">import</span> java.util.List;</span><br><span class="line"> </span><br><span class="line"><span class="keyword">import</span> org.dom4j.Attribute;</span><br><span class="line"><span class="keyword">import</span> org.dom4j.Document;</span><br><span class="line"><span class="keyword">import</span> org.dom4j.DocumentException;</span><br><span class="line"><span class="keyword">import</span> org.dom4j.DocumentHelper;</span><br><span class="line"><span class="keyword">import</span> org.dom4j.Element;</span><br><span class="line"><span class="keyword">import</span> org.dom4j.io.OutputFormat;</span><br><span class="line"><span class="keyword">import</span> org.dom4j.io.SAXReader;</span><br><span class="line"><span class="keyword">import</span> org.dom4j.io.XMLWriter;</span><br><span class="line"> </span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">Demo02Xml__</span>利用java修改xml内容 &#123;</span><br><span class="line">	<span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">main</span><span class="params">(String[] args)</span> <span class="keyword">throws</span> IOException, DocumentException &#123;</span><br><span class="line"> </span><br><span class="line">		 <span class="comment">//Java_Write_XML(); //java写xml</span></span><br><span class="line"> </span><br><span class="line">		java_XiuGai__XML(); <span class="comment">// java修改xml</span></span><br><span class="line"> </span><br><span class="line">	&#125;</span><br><span class="line"> </span><br><span class="line">	<span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">java_XiuGai__XML</span><span class="params">()</span> <span class="keyword">throws</span> DocumentException, IOException &#123;</span><br><span class="line">		<span class="comment">/*</span></span><br><span class="line"><span class="comment">		 * 2.java修改xml</span></span><br><span class="line"><span class="comment">		 */</span></span><br><span class="line">		<span class="comment">// 创建SAXReader对象</span></span><br><span class="line">		<span class="type">SAXReader</span> <span class="variable">sr</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">SAXReader</span>(); <span class="comment">// 需要导入jar包:dom4j</span></span><br><span class="line">		<span class="comment">// 关联xml</span></span><br><span class="line">		<span class="type">Document</span> <span class="variable">document</span> <span class="operator">=</span> sr.read(<span class="string">&quot;students.xml&quot;</span>);</span><br><span class="line"> </span><br><span class="line">		<span class="comment">// 获取根元素</span></span><br><span class="line">		<span class="type">Element</span> <span class="variable">root</span> <span class="operator">=</span> document.getRootElement();</span><br><span class="line">		<span class="comment">// 获取student标签</span></span><br><span class="line">		<span class="type">Element</span> <span class="variable">student</span> <span class="operator">=</span> root.element(<span class="string">&quot;student&quot;</span>);</span><br><span class="line">		<span class="comment">// 利用student标签添加属性</span></span><br><span class="line">		<span class="type">Element</span> <span class="variable">addAttribute</span> <span class="operator">=</span> student.addAttribute(<span class="string">&quot;身份证号&quot;</span>, <span class="string">&quot;XXXXX&quot;</span>);</span><br><span class="line"> </span><br><span class="line">		<span class="comment">// 在xml的某一个标签里修改一个属性</span></span><br><span class="line">		<span class="type">Attribute</span> <span class="variable">id_xg</span> <span class="operator">=</span> student.attribute(<span class="string">&quot;id&quot;</span>);</span><br><span class="line">		id_xg.setText(<span class="string">&quot;it002&quot;</span>);</span><br><span class="line"> </span><br><span class="line">		<span class="comment">// 修改xml里某一个元素</span></span><br><span class="line"> </span><br><span class="line">		<span class="comment">// 根据标签修改元素</span></span><br><span class="line">		<span class="comment">// 获取sex标签</span></span><br><span class="line">		<span class="type">Element</span> <span class="variable">sex</span> <span class="operator">=</span> student.element(<span class="string">&quot;sex&quot;</span>);</span><br><span class="line">		sex.setText(<span class="string">&quot;女女女女&quot;</span>);</span><br><span class="line">		<span class="comment">// 根据属性值修改元素</span></span><br><span class="line">		List&lt;Element&gt; elements = student.elements();</span><br><span class="line">		<span class="keyword">for</span> (Element element : elements) &#123;</span><br><span class="line">			<span class="keyword">if</span> (element.getText().endsWith(<span class="string">&quot;明&quot;</span>)) &#123;</span><br><span class="line">				element.setText(<span class="string">&quot;小小小小小明&quot;</span>);</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="comment">// 调用下面的静态方法完成xml的写出</span></span><br><span class="line">		saveDocument(document, <span class="keyword">new</span> <span class="title class_">File</span>(<span class="string">&quot;students.xml&quot;</span>));</span><br><span class="line">	&#125;</span><br><span class="line"> </span><br><span class="line">	<span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">Java_Write_XML</span><span class="params">()</span> <span class="keyword">throws</span> IOException &#123;</span><br><span class="line">		<span class="comment">/*</span></span><br><span class="line"><span class="comment">		 * 1.java写xml</span></span><br><span class="line"><span class="comment">		 */</span></span><br><span class="line"> </span><br><span class="line">		<span class="comment">// 生成xml的第一行 &lt;?xml version=&quot;1.0&quot; encoding=&quot;UTF-8&quot;?&gt;</span></span><br><span class="line">		<span class="type">Document</span> <span class="variable">document</span> <span class="operator">=</span> DocumentHelper.createDocument();</span><br><span class="line"> </span><br><span class="line">		<span class="comment">// 添加一个元素,作为根元素students</span></span><br><span class="line">		<span class="type">Element</span> <span class="variable">root</span> <span class="operator">=</span> document.addElement(<span class="string">&quot;students&quot;</span>);</span><br><span class="line"> </span><br><span class="line">		<span class="comment">// 根元素下的一个元素student</span></span><br><span class="line">		<span class="type">Element</span> <span class="variable">student</span> <span class="operator">=</span> root.addElement(<span class="string">&quot;student&quot;</span>);</span><br><span class="line">		<span class="comment">// 在student标签里添加属性</span></span><br><span class="line">		student.addAttribute(<span class="string">&quot;id&quot;</span>, <span class="string">&quot;it001&quot;</span>);</span><br><span class="line"> </span><br><span class="line">		<span class="comment">// 为其添加元素</span></span><br><span class="line">		<span class="type">Element</span> <span class="variable">name</span> <span class="operator">=</span> student.addElement(<span class="string">&quot;name&quot;</span>);</span><br><span class="line">		<span class="type">Element</span> <span class="variable">name1</span> <span class="operator">=</span> student.addElement(<span class="string">&quot;name&quot;</span>);</span><br><span class="line">		<span class="type">Element</span> <span class="variable">sex</span> <span class="operator">=</span> student.addElement(<span class="string">&quot;sex&quot;</span>);</span><br><span class="line">		name.setText(<span class="string">&quot;小红&quot;</span>);</span><br><span class="line">		name1.setText(<span class="string">&quot;小明&quot;</span>);</span><br><span class="line">		sex.setText(<span class="string">&quot;男&quot;</span>);</span><br><span class="line"> </span><br><span class="line">		<span class="comment">// 上面的操作都在内存中</span></span><br><span class="line"> </span><br><span class="line">		<span class="comment">// 调用下面的静态方法完成xml的写出</span></span><br><span class="line">		saveDocument(document, <span class="keyword">new</span> <span class="title class_">File</span>(<span class="string">&quot;students.xml&quot;</span>));</span><br><span class="line">	&#125;</span><br><span class="line"> </span><br><span class="line">	<span class="comment">// 下面的为固定代码---------可以完成java对XML的写,改等操作</span></span><br><span class="line">	<span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">saveDocument</span><span class="params">(Document document, File xmlFile)</span> <span class="keyword">throws</span> IOException &#123;</span><br><span class="line">		<span class="type">Writer</span> <span class="variable">osWrite</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">OutputStreamWriter</span>(<span class="keyword">new</span> <span class="title class_">FileOutputStream</span>(xmlFile));<span class="comment">// 创建输出流</span></span><br><span class="line">		<span class="type">OutputFormat</span> <span class="variable">format</span> <span class="operator">=</span> OutputFormat.createPrettyPrint(); <span class="comment">// 获取输出的指定格式</span></span><br><span class="line">		format.setEncoding(<span class="string">&quot;UTF-8&quot;</span>);<span class="comment">// 设置编码 ，确保解析的xml为UTF-8格式</span></span><br><span class="line">		<span class="type">XMLWriter</span> <span class="variable">writer</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">XMLWriter</span>(osWrite, format);<span class="comment">// XMLWriter</span></span><br><span class="line">															<span class="comment">// 指定输出文件以及格式</span></span><br><span class="line">		writer.write(document);<span class="comment">// 把document写入xmlFile指定的文件(可以为被解析的文件或者新创建的文件)</span></span><br><span class="line">		writer.flush();</span><br><span class="line">		writer.close();</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">//Java写出的XML</span></span><br><span class="line"> </span><br><span class="line"><span class="comment">//Java修改后的XML</span></span><br><span class="line"> </span><br></pre></td></tr></table></figure>
